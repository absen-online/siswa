<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi - Presensi Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    
    <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
        
        <h1 class="text-2xl font-extrabold text-gray-800 mb-1 mt-2">Scan ID Card</h1>
        <p class="text-sm text-gray-500 mb-4">Arahkan barcode ke kotak kamera</p>
        
        <div class="relative mb-6 rounded-2xl overflow-hidden border-4 border-slate-100 bg-slate-100 shadow-inner" style="min-height: 250px;">
            <div id="reader" class="w-full h-full object-cover"></div>
            <div class="absolute inset-0 pointer-events-none border-[40px] border-black/40"></div>
            <div class="absolute inset-0 pointer-events-none border-2 border-blue-500 m-8 rounded-lg"></div>
        </div>

        <div id="notification" class="hidden p-3 rounded-xl font-bold mb-4 text-sm transition-all duration-300"></div>
        
        <div class="mb-6 text-left border-t border-slate-100 pt-4 mt-2">
            <label class="block text-xs font-bold text-slate-500 mb-1">Kamera bermasalah? Input NIS Anda:</label>
            <div class="flex gap-2">
                <input type="number" id="manualNis" placeholder="Ketik NIS..." class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                <button onclick="prosesManual()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-md transition">Kirim</button>
            </div>
        </div>

        <button onclick="kembaliKeDashboard()" class="w-full py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition border border-slate-200">
            Kembali ke Dashboard
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxVExJmsEsupLdwcS18NWnDlKGU9LcAF3p8KWqmRSn4BviZpbsWnVOuCRIHVNvQR5ZJ/exec"; 
        const API_KEY = "belajarinovasi_123";
        
        // 1. Cek Sesi Login Dulu
        const session = JSON.parse(localStorage.getItem('userSession'));
        if (!session) {
            alert("Anda harus login terlebih dahulu!");
            window.location.href = 'login.html';
        }

        // Variabel Core Scanner
        let html5QrCode;
        let isProcessing = false;

        function kembaliKeDashboard() {
            if(html5QrCode) html5QrCode.stop().catch(e => console.log(e));
            window.location.href = session.role + '.html';
        }

        // FUNGSI UTAMA: Mengirim Data dan Validasi Frontend
        async function kirimDataAbsen(nisTeks) {
            if (isProcessing) return;
            isProcessing = true; 
            
            // Jeda kamera saat memproses agar tidak scan berkali-kali
            if(html5QrCode) html5QrCode.pause();
            
            const notif = document.getElementById('notification');
            
            // VALIDASI KEAMANAN: Cegah Titip Absen di Frontend
            if (session.role === 'siswa' && nisTeks.toString() !== session.username.toString()) {
                notif.className = "p-3 rounded-xl font-bold mb-4 bg-red-100 text-red-800 block border border-red-300";
                notif.innerText = "❌ Ditolak! Anda tidak bisa mengabsenkan siswa lain.";
                
                setTimeout(() => { 
                    isProcessing = false; 
                    if(html5QrCode) html5QrCode.resume(); 
                    document.getElementById('manualNis').value = ""; 
                }, 3000);
                return;
            }

            notif.className = "p-3 rounded-xl font-bold mb-4 bg-blue-100 text-blue-800 block border border-blue-200";
            notif.innerText = "⏳ Memproses Data...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        action: "absen", 
                        api_key: API_KEY, 
                        nis: nisTeks,
                        role: session.role,
                        session_nis: session.username
                    })
                });
                const result = await res.json();

                notif.className = `p-3 rounded-xl font-bold mb-4 block border ${result.success ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300'}`;
                notif.innerText = result.success ? `✅ ${result.message}` : `❌ ${result.message}`;

                if(result.success) {
                    // Berhasil, kembali ke dashboard
                    setTimeout(kembaliKeDashboard, 2000);
                } else {
                    // Gagal (contoh: sudah absen), lanjutkan scanner
                    setTimeout(() => { 
                        isProcessing = false; 
                        if(html5QrCode) html5QrCode.resume(); 
                        notif.classList.add('hidden'); 
                    }, 3000);
                }
            } catch(e) {
                notif.className = "p-3 rounded-xl font-bold mb-4 bg-red-100 text-red-800 block border border-red-300";
                notif.innerText = "❌ Gagal terhubung ke server.";
                setTimeout(() => { 
                    isProcessing = false; 
                    if(html5QrCode) html5QrCode.resume(); 
                }, 3000);
            }
        }

        function prosesManual() {
            const nis = document.getElementById('manualNis').value;
            if(!nis) return alert("Masukkan NIS terlebih dahulu!");
            kirimDataAbsen(nis);
        }

        // Inisialisasi Kamera Belakang yang Stabil
        window.onload = () => {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            // Paksa menggunakan kamera belakang (environment)
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                kirimDataAbsen(decodedText);
            }).catch(err => {
                // Jika kamera gagal dimuat (biasanya karena belum diizinkan oleh browser)
                const notif = document.getElementById('notification');
                notif.className = "p-3 rounded-xl font-bold mb-4 bg-red-100 text-red-800 block border border-red-300";
                notif.innerText = "Kamera diblokir. Mohon izinkan akses kamera di browser Anda.";
            });
        };
    </script>
</body>
</html>
